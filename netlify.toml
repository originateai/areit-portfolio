[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  timeout = 1560

[context.production]
  environment = { NODE_VERSION = "18" }

[[scheduled_functions]]
  name = "morning-scan"
  cron = "0 22 * * 0-4"

[[scheduled_functions]]
  name = "fetch-prices"
  cron = "0 6 * * 1-5"

[[scheduled_functions]]
  name = "yield-triggers"
  cron = "5 6 * * 1-5"
